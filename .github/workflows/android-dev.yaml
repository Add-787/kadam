name: Flutter CI (Dev)

on:
  push:
    branches-ignore: [ "main" ]
    paths:
      - 'mobile-app/**'
  pull_request:
    branches-ignore: [ "main" ]
    paths:
      - 'mobile-app/**'
  workflow_dispatch:

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./mobile-app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Run Tests
        run: flutter test